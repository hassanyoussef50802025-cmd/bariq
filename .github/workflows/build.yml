name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1 | tee build_log.txt || true
          tail -n 100 build_log.txt > error_summary.txt

      - name: Upload error summary
        uses: actions/upload-artifact@v4
        with:
          name: error-summary
          path: error_summary.txt

      - name: Check build success
        run: |
          ls bin/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bariq-apk
          path: bin/*.apk
